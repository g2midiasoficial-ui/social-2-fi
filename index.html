<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialFlow — Planeador e Gestor de Redes Sociais</title>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(value) {
              currentFetch = value;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to define fetch getter/setter on window:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
